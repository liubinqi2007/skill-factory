<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Factory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=12"></head>
<body>
    <div class="app">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">&#9670;</span>
                    <span class="logo-text">Skill Factory</span>
                </div>
                <button class="btn-new" id="btnNew" title="创建新 Skill">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
            <div class="skill-list" id="skillList"></div>
            <div class="status-bar">
                <div class="status-dot-pool" id="statusDotPool"></div>
                <span id="poolStatus">0/3 实例</span>
            </div>
        </aside>

        <!-- 右侧主区域 -->
        <main class="main-area">
            <!-- 空状态 -->
            <div class="empty-state" id="emptyState">
                <div class="empty-decoration">
                    <div class="empty-ring"></div>
                    <div class="empty-ring delay"></div>
                    <svg class="empty-plus" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
                <h2 class="empty-title">创建你的第一个 Skill</h2>
                <p class="empty-desc">用自然语言描述你想要的 Skill，AI 会帮你生成并持续优化</p>
                <div class="quick-start">
                    <input type="text" id="quickInput" placeholder="例如：帮我创建一个代码审查的 skill..." autocomplete="off">
                    <button id="quickBtn">
                        <span>开始创建</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </button>
                </div>
            </div>

            <!-- 聊天区 -->
            <div class="chat-area" id="chatArea" style="display:none">
                <div class="chat-header" id="chatHeader">
                    <div class="chat-header-left">
                        <span class="chat-skill-name" id="skillName">-</span>
                        <span class="chat-skill-status" id="skillStatus">-</span>
                    </div>
                </div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="chatInput" placeholder="描述你想要的修改..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" title="发送">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 空闲超时弹窗 -->
    <div class="idle-modal-overlay" id="idleModal" style="display:none">
        <div class="idle-modal">
            <div class="idle-modal-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <h3 class="idle-modal-title">连接已断开</h3>
            <p class="idle-modal-desc" id="idleModalDesc">页面长时间未操作，为节省资源已自动断开连接。</p>
            <button class="idle-modal-btn" id="idleReconnectBtn">重新连接</button>
        </div>
    </div>

    <script src="/static/app.js?v=16"></script>
</body>
</html>
